<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flux Messenger</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .whatsapp-bg { background-color: #e5ddd5; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- CORE LOGIC: UNIQUE ID GENERATION ---
        const generatePhoneId = () => {
            const part1 = Math.floor(100 + Math.random() * 900);
            const part2 = Math.floor(100 + Math.random() * 900);
            const part3 = Math.floor(1000 + Math.random() * 9000);
            return `+1 (${part1}) ${part2}-${part3}`;
        };

        const FluxApp = () => {
            const [myId] = useState(generatePhoneId());
            const [activeChat, setActiveChat] = useState(null);
            const [msgInput, setMsgInput] = useState("");
            const [showAddFriend, setShowAddFriend] = useState(false);
            const [newFriendId, setNewFriendId] = useState("");
            
            // Initial Mock Data
            const [friends, setFriends] = useState([
                { id: "f1", name: "Alpha_User", phoneId: "+1 (404) 555-0192", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Alpha" },
                { id: "f2", name: "Beta_Dev", phoneId: "+1 (800) 123-4567", avatar: "https://api.dicebear.com/7.x/avataaars/svg?seed=Beta" }
            ]);

            const [messages, setMessages] = useState({
                "f1": [{ sender: "them", text: "Welcome to Flux!", time: "12:00 PM" }],
                "f2": [{ sender: "them", text: "The random ID system is live.", time: "01:15 PM" }]
            });

            const scrollRef = useRef(null);
            useEffect(() => {
                if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight;
            }, [messages, activeChat]);

            const handleSend = (e) => {
                e.preventDefault();
                if (!msgInput.trim() || !activeChat) return;

                const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                const newMsg = { sender: "me", text: msgInput, time };

                setMessages(prev => ({
                    ...prev,
                    [activeChat.id]: [...(prev[activeChat.id] || []), newMsg]
                }));
                setMsgInput("");
            };

            const addFriend = () => {
                if (!newFriendId.includes("+1")) {
                    alert("Please enter a valid Flux ID (e.g. +1 (XXX) XXX-XXXX)");
                    return;
                }
                const newFriend = {
                    id: Date.now().toString(),
                    name: `User_${newFriendId.slice(-4)}`,
                    phoneId: newFriendId,
                    avatar: `https://api.dicebear.com/7.x/avataaars/svg?seed=${newFriendId}`
                };
                setFriends([...friends, newFriend]);
                setNewFriendId("");
                setShowAddFriend(false);
            };

            return (
                <div className="flex h-screen w-full bg-gray-100 overflow-hidden">
                    
                    {/* SIDEBAR - TELEGRAM STYLE */}
                    <div className="w-80 md:w-96 bg-white border-r border-gray-200 flex flex-col z-20 shadow-xl">
                        <header className="p-4 bg-[#0088cc] text-white">
                            <div className="flex justify-between items-center mb-4">
                                <h1 className="text-2xl font-black tracking-tighter italic">FLUX</h1>
                                <button onClick={() => setShowAddFriend(!showAddFriend)} className="p-2 hover:bg-white/20 rounded-full transition-all">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M18 9v3m0 0v3m0-3h3m-3 0h-3m-2-5a4 4 0 11-8 0 4 4 0 018 0zM3 20a6 6 0 0112 0v1H3v-1z" />
                                    </svg>
                                </button>
                            </div>
                            <div className="bg-black/20 p-3 rounded-lg border border-white/10">
                                <p className="text-[10px] uppercase font-bold opacity-70">Your Private Flux ID</p>
                                <p className="text-sm font-mono tracking-widest font-bold">{myId}</p>
                            </div>
                        </header>

                        {showAddFriend && (
                            <div className="p-4 bg-blue-50 border-b border-blue-100 animate-in slide-in-from-top duration-200">
                                <input 
                                    value={newFriendId}
                                    onChange={(e) => setNewFriendId(e.target.value)}
                                    placeholder="Enter Friend ID..." 
                                    className="w-full p-2 border rounded text-sm mb-2 outline-none focus:ring-2 focus:ring-blue-400"
                                />
                                <button onClick={addFriend} className="w-full bg-[#0088cc] text-white py-1 rounded text-sm font-bold">Add Friend</button>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto custom-scrollbar">
                            {friends.map(friend => (
                                <div 
                                    key={friend.id} 
                                    onClick={() => setActiveChat(friend)}
                                    className={`flex items-center p-4 cursor-pointer border-b border-gray-50 transition-colors ${activeChat?.id === friend.id ? 'bg-blue-50' : 'hover:bg-gray-50'}`}
                                >
                                    <img src={friend.avatar} className="w-12 h-12 rounded-full bg-gray-200 mr-4" alt="avatar" />
                                    <div className="flex-1 min-w-0">
                                        <div className="flex justify-between items-baseline">
                                            <h3 className="font-bold text-gray-800 truncate">{friend.name}</h3>
                                            <span className="text-[10px] text-gray-400">Online</span>
                                        </div>
                                        <p className="text-xs text-gray-500 truncate">{friend.phoneId}</p>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* MAIN CHAT - WHATSAPP STYLE */}
                    <div className="flex-1 flex flex-col relative">
                        {activeChat ? (
                            <>
                                <header className="h-16 bg-[#075e54] text-white flex items-center px-4 shadow-md z-10">
                                    <img src={activeChat.avatar} className="w-10 h-10 rounded-full mr-3 border border-white/20" />
                                    <div>
                                        <h2 className="font-bold leading-none">{activeChat.name}</h2>
                                        <span className="text-[10px] opacity-70 italic">Encrypted Flux Session</span>
                                    </div>
                                </header>

                                <div ref={scrollRef} className="flex-1 p-4 md:p-10 overflow-y-auto whatsapp-bg custom-scrollbar flex flex-col space-y-2">
                                    {(messages[activeChat.id] || []).map((m, i) => (
                                        <div key={i} className={`flex ${m.sender === 'me' ? 'justify-end' : 'justify-start'}`}>
                                            <div className={`max-w-md p-3 rounded-lg shadow-sm text-sm relative ${m.sender === 'me' ? 'bg-[#dcf8c6] rounded-tr-none' : 'bg-white rounded-tl-none'}`}>
                                                <p className="pr-10">{m.text}</p>
                                                <span className="text-[9px] text-gray-400 absolute bottom-1 right-2 uppercase font-bold">{m.time}</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>

                                <form onSubmit={handleSend} className="p-3 bg-[#f0f2f5] flex items-center gap-2 border-t border-gray-200">
                                    <input 
                                        value={msgInput}
                                        onChange={(e) => setMsgInput(e.target.value)}
                                        placeholder="Type a message..." 
                                        className="flex-1 p-3 rounded-full border-none focus:ring-0 outline-none shadow-inner text-sm"
                                    />
                                    <button type="submit" className="bg-[#0088cc] text-white p-3 rounded-full hover:scale-105 transition-transform active:scale-95 shadow-lg">
                                        <svg xmlns="http://www.w3.org/2000/svg" className="h-5 w-5 rotate-90" viewBox="0 0 20 20" fill="currentColor">
                                            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
                                        </svg>
                                    </button>
                                </form>
                            </>
                        ) : (
                            <div className="flex-1 flex flex-col items-center justify-center bg-gray-50 text-gray-400 italic">
                                <div className="w-24 h-24 mb-4 opacity-10 bg-black rounded-full flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-12 w-12" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a1.994 1.994 0 01-1.414-.586m0 0L11 14h4a2 2 0 002-2V6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2v4l.586-.586z" />
                                    </svg>
                                </div>
                                <p>Select a friend or add one using their ID</p>
                                <p className="text-xs mt-2 not-italic font-bold tracking-widest text-[#0088cc]">FLUX NETWORK v1.0</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<FluxApp />);
    </script>
</body>
</html>
